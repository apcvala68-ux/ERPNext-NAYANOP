## Log Management

### Log Rotation

```bash
# /etc/logrotate.d/automotive-crm
/home/frappe/frappe-bench/logs/*.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    create 0640 frappe frappe
    sharedscripts
    postrotate
        supervisorctl restart frappe-bench-worker:frappe-bench-short-worker
        supervisorctl restart frappe-bench-worker:frappe-bench-default-worker
        supervisorctl restart frappe-bench-worker:frappe-bench-long-worker
    endscript
}
```

### Centralized Logging

```yaml
# filebeat.yml
filebeat.inputs:
  - type: log
    enabled: true
    paths:
      - /home/frappe/frappe-bench/logs/*.log
    fields:
      service: automotive-crm
    fields_under_root: true

output.elasticsearch:
  hosts: ["elasticsearch:9200"]
  index: "automotive-crm-%{+yyyy.MM.dd}"
```

## Performance Monitoring

### Benchmarking

```bash
# Run benchmark
docker-compose exec backend bench benchmark --site site1.localhost

# Load test
ab -n 1000 -c 10 https://yourdomain.com/api/method/ping
```

### Profiling

```python
# Profile a function
from frappe.utils.profiler import profile

@profile
def expensive_function():
    # Code to profile
    pass
```

