# Monitoring Configuration

## Health Checks

```yaml
healthchecks:
  - name: "API Response Time"
    endpoint: "/api/method/ping"
    interval: 60
    timeout: 10
    alert_threshold: 5000  # ms
    
  - name: "Database Connection"
    type: "mysql"
    host: "mariadb"
    port: 3306
    interval: 120
    
  - name: "Redis Connection"
    type: "redis"
    host: "redis-cache"
    port: 6379
    interval: 60
    
  - name: "Disk Usage"
    type: "disk"
    threshold: 80  # percent
    interval: 300
```

## Alert Rules

```yaml
alerts:
  - name: "High Error Rate"
    condition: "rate(http_requests_total{status=~'5..'}[5m]) > 0.1"
    severity: "critical"
    notify: ["slack", "email"]
    
  - name: "High Response Time"
    condition: "histogram_quantile(0.95, http_request_duration_seconds) > 2"
    severity: "warning"
    notify: ["slack"]
    
  - name: "Database Connection Pool Exhausted"
    condition: "db_connections_active > 80"
    severity: "critical"
    notify: ["slack", "email", "pager"]
    
  - name: "Low Disk Space"
    condition: "disk_usage_percent > 85"
    severity: "warning"
    notify: ["slack", "email"]
```

## Dashboard Metrics

### System Metrics

| Metric | Description | Unit |
|--------|-------------|------|
| CPU Usage | CPU utilization percentage | % |
| Memory Usage | Memory utilization percentage | % |
| Disk Usage | Disk utilization percentage | % |
| Network I/O | Network input/output | bytes/sec |

### Application Metrics

| Metric | Description | Unit |
|--------|-------------|------|
| Request Rate | Requests per second | req/s |
| Response Time | Average response time | ms |
| Error Rate | Errors per second | err/s |
| Active Users | Currently active users | count |

### Database Metrics

| Metric | Description | Unit |
|--------|-------------|------|
| Connections | Active database connections | count |
| Query Rate | Queries per second | qps |
| Slow Queries | Queries taking > 1s | count |
| Replication Lag | Slave replication lag | seconds |

### Redis Metrics

| Metric | Description | Unit |
|--------|-------------|------|
| Hit Rate | Cache hit rate | % |
| Memory Usage | Redis memory usage | bytes |
| Connected Clients | Connected clients | count |
| Commands/sec | Commands per second | cmd/s |

## Monitoring Tools

### Prometheus

```yaml
# prometheus.yml
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'automotive-crm'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/metrics'
```

### Grafana Dashboard

```json
{
  "dashboard": {
    "title": "Automotive CRM",
    "panels": [
      {
        "title": "Request Rate",
        "type": "graph",
        "targets": [
          {
            "expr": "rate(http_requests_total[5m])",
            "legendFormat": "{{method}} {{status}}"
          }
        ]
      }
    ]
  }
}
```

